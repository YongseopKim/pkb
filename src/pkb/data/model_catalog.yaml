# PKB Model Catalog
# Reference pricing and recommended tier assignments for LLM providers.
# Prices: USD per million tokens (MTok)
# Updated: 2026-02-22
#
# Tiers:
#   1 - Budget/Fast: metadata extraction, simple structured output
#   2 - Standard: chat, RAG, complex extraction
#   3 - Premium: complex reasoning, highest quality output
#
# Sources:
#   Anthropic: https://platform.claude.com/docs/en/about-claude/pricing
#   OpenAI:    https://platform.openai.com/docs/pricing
#   Google:    https://ai.google.dev/gemini-api/docs/pricing
#   xAI:       https://docs.x.ai/developers/models

tiers:
  1:
    label: budget
    description_ko: "저렴/빠름 — 메타데이터 추출, 간단한 작업"
    description_en: "Budget/Fast — metadata extraction, simple tasks"
  2:
    label: standard
    description_ko: "균형 — 채팅, RAG, 복잡한 추출"
    description_en: "Standard — chat, RAG, complex extraction"
  3:
    label: premium
    description_ko: "프리미엄 — 복잡한 추론, 최고 품질"
    description_en: "Premium — complex reasoning, highest quality"

